name: Daily Scrape

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          curl -sf -X POST https://deals-monitor.fly.dev/api/scrape \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 600
