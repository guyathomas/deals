app = "deals-monitor"
primary_region = "ewr"

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[mounts]
  source = "deals_data"
  destination = "/data"

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/sites"
  timeout = "5s"
